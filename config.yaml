# GRANITE Configuration
# All parameters should be set here; CLI arguments act as overrides only.

# =============================================================================
# Geographic Scope
# =============================================================================
data:
  state_fips: "47"
  county_fips: "065"
  census_year: 2020
  address_file: "chattanooga.geojson"
  svi_file: "data/raw/SVI_2020_US.csv"
  roads_file: "data/raw/tl_2023_47065_roads.shp"
  census_tracts_file: "data/raw/tl_2020_47_tract.shp"

# =============================================================================
# Accessibility Computation
# =============================================================================
accessibility:
  enabled: true
  max_addresses_per_tract: 10
  destinations:
    employment: true
    healthcare: true
    grocery: true
  timeout_minutes: 2

# =============================================================================
# Transit Data
# =============================================================================
transit:
  source: "gtfs"
  local_file: "carta_gtfs.zip"

# =============================================================================
# OSRM Routing
# =============================================================================
routing:
  driving_url: "http://localhost:5000"
  walking_url: "http://localhost:5001"
  batch_size: 100

# =============================================================================
# Model Architecture
# =============================================================================
model:
  hidden_dim: 64
  dropout: 0.3
  attention_heads: 4
  use_context_gating: true
  use_multitask: true

# =============================================================================
# Training
# =============================================================================
training:
  epochs: 150
  learning_rate: 0.001
  weight_decay: 0.0001
  enforce_constraints: true
  constraint_weight: 2.0
  variation_weight: 1.5
  early_stopping_patience: 15

# =============================================================================
# Mixture of Experts
# =============================================================================
mixture:
  enabled: false
  gate_epochs: 100
  finetune_epochs: 50
  svi_boundaries:
    low: [0.01, 0.40]
    medium: [0.30, 0.70]
    high: [0.55, 1.00]
  expert_hidden_dim: 64
  gate_hidden_dim: 32

# =============================================================================
# Features
# =============================================================================
features:
  type: "nlcd"
  nlcd_path: "./data/nlcd_hamilton_county.tif"
  scaling: "robust"

# =============================================================================
# Processing
# =============================================================================
processing:
  verbose: true
  random_seed: 42
  enable_caching: true
  cache_dir: "./granite_cache"

# =============================================================================
# Validation
# =============================================================================
validation:
  mode: null  # null, 'holdout', or 'global'
  compare_baselines: true
  compute_spatial_diagnostics: true

# =============================================================================
# Output
# =============================================================================
output:
  directory: "./output"
  save_predictions: true
  save_plots: true
  save_intermediate: false